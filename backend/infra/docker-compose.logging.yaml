version: "3.8"

name: tipster-logging
services:
  loki:
    image: grafana/loki:2.9.4
    container_name: tipster_loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:2.9.4
    container_name: tipster_promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logging/promtail-config.yaml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.4.3
    container_name: tipster_grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./logging/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
