version: "3.9"
name: tipster-accounts

services:
  postgres:
    image: postgres:16
    container_name: accounts_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: accounts
    ports:
      - "5433:5432"
    volumes:
      - accounts_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d accounts"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  accounts_postgres_data: