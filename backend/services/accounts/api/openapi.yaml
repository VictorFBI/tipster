openapi: 3.0.0
info:
  title: Auth API
  version: 1.0.0
  description: API for authentication service

paths:
  /accounts/profile:
    get:
      summary: Read account profile
      parameters:
        - name: account_id
          in: query
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountProfileClaims'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      summary: Partial update of account profile (only sent fields are updated)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountProfileClaims'
      responses:
        '200':
          description: Success
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token from auth service
  schemas:
    AccountProfileClaims:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        username:
          type: string
        bio:
          type: string
        avatar_url:
          type: string
        wallet_address:
          type: string

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

