openapi: 3.0.0
info:
  title: Content API
  version: 1.0.0
  description: API for the content service (posts, comments, likes)

paths:
  /content/posts:
    get:
      summary: List the authenticated user's posts
      description: >
        Posts where author_id equals the JWT subject. Ordered by created_at
        descending, then id descending. The client may treat fewer than `limit`
        items as the last page.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: true
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyPostsPage'
        '400':
          description: Bad request (invalid or missing query parameters)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '200':
          description: Post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update a post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePostRequest'
      responses:
        '200':
          description: Post updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not the post author)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Post not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete a post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeletePostRequest'
      responses:
        '200':
          description: Post deleted
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not the post author)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Post not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /content/posts/liked:
    get:
      summary: List posts liked by the authenticated user
      description: >
        Joins likes for the JWT subject with posts. Each item includes the post
        and liked_at from the like row. Ordered by like time descending, then
        like id descending. The client may treat fewer than `limit` items as
        the last page.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: true
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LikedPostsPage'
        '400':
          description: Bad request (invalid or missing query parameters)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /content/comments:
    post:
      summary: Create a comment on a post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '200':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Post not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update a comment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommentRequest'
      responses:
        '200':
          description: Comment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not the comment author)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Comment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete a comment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteCommentRequest'
      responses:
        '200':
          description: Comment deleted
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not the comment author)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Comment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /content/likes:
    post:
      summary: Add a like on a post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LikeRequest'
      responses:
        '200':
          description: Like recorded (or already present, idempotent)
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Post not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Remove a like from a post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LikeRequest'
      responses:
        '200':
          description: Like removed (or was not present, idempotent)
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Post not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token (subject identifies the acting user)

  schemas:
    Post:
      type: object
      properties:
        id:
          type: string
          format: uuid
        author_id:
          type: string
          format: uuid
        content:
          type: string
        image_object_ids:
          type: array
          description: Object ids in permanent storage (same values as after content commit from temp); display order
          maxItems: 10
          items:
            type: string
            minLength: 1
            maxLength: 512
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - author_id
        - content
        - image_object_ids
        - created_at
        - updated_at

    CreatePostRequest:
      type: object
      properties:
        content:
          type: string
        image_object_ids:
          type: array
          description: Optional; up to 10 object ids in the temporary upload bucket (from media presigned upload). Content service moves them to permanent storage when creating the post.
          maxItems: 10
          items:
            type: string
            minLength: 1
            maxLength: 512
      required:
        - content

    UpdatePostRequest:
      type: object
      description: Partial update; send content and/or image_object_ids (replaces image set when sent)
      properties:
        post_id:
          type: string
          format: uuid
        content:
          type: string
        image_object_ids:
          type: array
          maxItems: 10
          items:
            type: string
            minLength: 1
            maxLength: 512
      required:
        - post_id

    DeletePostRequest:
      type: object
      properties:
        post_id:
          type: string
          format: uuid
      required:
        - post_id

    MyPostsPage:
      type: object
      description: Paginated list of posts for the authenticated author
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Post'
        limit:
          type: integer
          minimum: 1
          maximum: 100
        offset:
          type: integer
          minimum: 0
      required:
        - items
        - limit
        - offset

    LikedPostItem:
      type: object
      description: A post the user has liked, with the time the like was recorded
      properties:
        post:
          $ref: '#/components/schemas/Post'
        liked_at:
          type: string
          format: date-time
      required:
        - post
        - liked_at

    LikedPostsPage:
      type: object
      description: Paginated list of posts the authenticated user has liked
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LikedPostItem'
        limit:
          type: integer
          minimum: 1
          maximum: 100
        offset:
          type: integer
          minimum: 0
      required:
        - items
        - limit
        - offset

    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        post_id:
          type: string
          format: uuid
        author_id:
          type: string
          format: uuid
        content:
          type: string
        image_object_ids:
          type: array
          description: Object ids in permanent storage; display order
          maxItems: 10
          items:
            type: string
            minLength: 1
            maxLength: 512
        parent_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - post_id
        - author_id
        - content
        - image_object_ids
        - created_at
        - updated_at

    CreateCommentRequest:
      type: object
      properties:
        post_id:
          type: string
          format: uuid
        content:
          type: string
        image_object_ids:
          type: array
          description: Optional; temp-bucket object ids from presigned upload; content service commits to permanent storage when creating the comment
          maxItems: 10
          items:
            type: string
            minLength: 1
            maxLength: 512
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: If set, this comment is a reply to another comment on the same post
      required:
        - post_id
        - content

    UpdateCommentRequest:
      type: object
      description: Partial update; send content and/or image_object_ids (replaces image set when sent)
      properties:
        comment_id:
          type: string
          format: uuid
        content:
          type: string
        image_object_ids:
          type: array
          maxItems: 10
          items:
            type: string
            minLength: 1
            maxLength: 512
      required:
        - comment_id

    DeleteCommentRequest:
      type: object
      properties:
        comment_id:
          type: string
          format: uuid
      required:
        - comment_id

    LikeRequest:
      type: object
      description: Target post for like / unlike
      properties:
        post_id:
          type: string
          format: uuid
      required:
        - post_id

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
