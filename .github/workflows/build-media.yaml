name: Build media service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/services/media/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/media
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/services/media/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -o media-server ./cmd/server

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: media-server
          path: backend/services/media/media-server
          retention-days: 14
