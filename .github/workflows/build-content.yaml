name: Build content service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/services/content/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/content
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.5'
          cache-dependency-path: backend/services/content/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -o content-server ./cmd/server

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: content-server
          path: backend/services/content/content-server
          retention-days: 14
