name: Build auth service

on:
  push:
    branches:
      - master
    # paths:
    #   - 'backend/services/auth/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/auth
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.5'

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -o auth-server ./cmd/server

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: auth-server
          path: ./auth-server
          retention-days: 14
