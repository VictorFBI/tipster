name: Build accounts service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/services/accounts/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/accounts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.5'
          cache-dependency-path: backend/services/accounts/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -o accounts-server ./cmd/server

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: accounts-server
          path: backend/services/accounts/accounts-server
          retention-days: 14
